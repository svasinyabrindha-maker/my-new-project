<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sri Academy Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#4facfe,#00f2fe);
font-family:'Poppins',sans-serif;
}

.container{
text-align:center;
}

.title{
font-family:'Fredoka',sans-serif;
font-size:32px;
color:white;
margin-bottom:15px;
}

.calculator{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
width:300px;
}

.display{
width:100%;
height:50px;
font-size:22px;
text-align:right;
padding-right:10px;
border:none;
border-radius:10px;
background:#f1f3f6;
margin-bottom:15px;
}

.buttons{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

button{
height:45px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
background:#e9eef5;
}

button:hover{
background:#d9e2ec;
}

.operator{
background:#ffd166;
}

.equal{
background:#06d6a0;
color:white;
grid-column:span 2;
}

.clear{
background:#ef476f;
color:white;
}

.footer{
margin-top:8px;
font-size:12px;
color:#666;
}

</style>
</head>

<body>

<div class="container">

<div class="title">Sri Academy Calculator</div>

<div class="calculator">

<input type="text" id="display" class="display" readonly>

<div class="buttons">

<button onclick="press('7')">7</button>
<button onclick="press('8')">8</button>
<button onclick="press('9')">9</button>
<button class="operator" onclick="press('/')">÷</button>

<button onclick="press('4')">4</button>
<button onclick="press('5')">5</button>
<button onclick="press('6')">6</button>
<button class="operator" onclick="press('*')">×</button>

<button onclick="press('1')">1</button>
<button onclick="press('2')">2</button>
<button onclick="press('3')">3</button>
<button class="operator" onclick="press('-')">−</button>

<button onclick="press('0')">0</button>
<button class="clear" onclick="clearDisplay()">C</button>
<button class="operator" onclick="press('+')">+</button>
<button class="equal" onclick="calculate()">=</button>

</div>

<div class="footer">Educational Calculator for Sri Academy</div>

</div>
</div>

<script>

function press(value){
document.getElementById("display").value += value;
}

function calculate(){
try{
let expression = document.getElementById("display").value;
let result = eval(expression);
document.getElementById("display").value = result;
}
catch{
document.getElementById("display").value = "Error";
}
}

function clearDisplay(){
document.getElementById("display").value = "";
}

</script>

</body>
</html>
